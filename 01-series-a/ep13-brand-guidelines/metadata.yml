title: "Anthropic Skills: brand-guidelines — Full Visual Identity from 3 Sentences | Ep 13"

description: |
  In this episode, we demo the brand-guidelines Anthropic Skill from Smithery.ai —
  the skill that takes a minimal brand brief and generates a complete visual identity
  system: color palette, typography pairing, spacing scale, logo rules, do/don't
  examples, and application mockup specs.

  We build a full brand guidelines document for Canopy, a fictional B2B climate-tech
  startup — starting from nothing but a logo description, three brand adjectives, and
  a single sentence about brand feel. Then we iterate to add a dark mode palette variant.

  TIMESTAMPS:
  0:00 — Cold Open
  0:30 — What is brand-guidelines?
  1:30 — Installation & Skill Deep Dive
  3:30 — Live Demo: Canopy brand guidelines start to finish
  9:30 — Results & Other Use Cases
  11:00 — Wrap-Up

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/brand-guidelines
  Install: npx @smithery/cli@latest skill add anthropics/brand-guidelines
  GitHub (this series): https://github.com/agentfactory/anthropic-skills-showcase
  Episode 13 folder: https://github.com/agentfactory/anthropic-skills-showcase/tree/main/01-series-a/ep13-brand-guidelines

