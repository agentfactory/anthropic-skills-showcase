title: "Anthropic Skills: skill-creator — Build Your Own Claude Skill in 10 Minutes | Ep 01"

description: |
  In this episode, we demo the skill-creator Anthropic Skill from Smithery.ai —
  the meta-skill that teaches Claude how to build new skills.

  We build a meeting-notes-formatter skill from scratch: takes any raw meeting
  transcript and produces a clean markdown file with Summary, Action Items, and
  Decisions — every time, automatically.

  TIMESTAMPS:
  0:00 — Cold Open
  0:30 — What is skill-creator?
  1:30 — Installation & Deep Dive
  3:30 — Live Demo: Building meeting-notes-formatter
  9:30 — Results & Other Use Cases
  11:00 — Wrap-Up

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/skill-creator
  Install: npx @smithery/cli@latest skill add anthropics/skill-creator
  GitHub (this series): https://github.com/agentfactory/anthropic-skills-showcase
  Episode 01 folder: https://github.com/agentfactory/anthropic-skills-showcase/tree/main/01-series-a/ep01-skill-creator

