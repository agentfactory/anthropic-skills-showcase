title: "Build an Interactive Sales Dashboard from a CSV in 45 Seconds (No BI Tool Required)"

description: |
  In this episode of the Anthropic Skills Showcase, we install the interactive-dashboard-builder skill and turn a raw quarterly sales CSV into a fully interactive HTML dashboard — with live charts, filterable dropdowns, KPI cards, and a date range picker — in a single Claude Code session.

  No Tableau. No Python. No JavaScript. Just a CSV and a prompt.

  Install the skill:
  npx @smithery/cli@latest skill add anthropics/interactive-dashboard-builder

  Skill page: https://smithery.ai/skills/anthropics/interactive-dashboard-builder
  GitHub (all episode files): https://github.com/agentfactory/anthropic-skills-showcase

  ---

  TIMESTAMPS
  0:00 - Cold Open (live dashboard reveal)
  0:30 - What is interactive-dashboard-builder?
  1:30 - Install command + SKILL.md walkthrough
  3:30 - Live Demo: building the Vantage Analytics dashboard
  5:15 - Aha moment: browser opens, interactive dashboard loads
  6:30 - Drilling into filters: region, rep, product
  7:30 - Refinement: adding a date range picker
  9:30 - Results + 3 other use cases (marketing, support, finance)
  11:00 - Wrap-up + CTA + Episode 10 tease

  ---

  WHAT YOU'LL LEARN
  - How to install Smithery skills with one command
  - How to prompt for specific KPI cards, chart types, and filter dimensions
  - How to refine your dashboard output with natural-language follow-up prompts
  - 3 other data domains where this skill saves hours of manual work

  ---

  SERIES C — Data & Analytics | Anthropic Skills Showcase

