title: "3 CSS Themes in 3 Minutes — No CSS Written | theme-factory Anthropic Skill | Ep 10"

description: |
  In this episode, we demo the theme-factory Anthropic Skill from Smithery.ai —
  the skill that generates production-quality CSS themes from plain English descriptions.

  We take a completely unstyled HTML annual report for fictional company Meridian Analytics
  and apply three radically different CSS themes in sequence:
  1. Corporate Minimal — restrained, navy-and-white, Goldman Sachs energy
  2. Bold Editorial — New York Times feature, large display type, orange accents
  3. Dark Tech — Stripe/Vercel dark mode, monospace data, terminal-native feel

  Each theme takes under 5 minutes. No manual CSS writing. No guessing at type scales
  or hex codes. Same HTML file, three completely different design identities.

  TIMESTAMPS:
  0:00 — Cold Open
  0:30 — What is theme-factory?
  1:30 — Installation & Deep Dive
  3:30 — Live Demo: Three themes on an annual report
  9:30 — Results & Other Use Cases
  11:00 — Wrap-Up

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/theme-factory
  Install: npx @smithery/cli@latest skill add anthropics/theme-factory
  GitHub (this series): https://github.com/agentfactory/anthropic-skills-showcase
  Episode 10 folder: https://github.com/agentfactory/anthropic-skills-showcase/tree/main/01-series-a/ep10-theme-factory

