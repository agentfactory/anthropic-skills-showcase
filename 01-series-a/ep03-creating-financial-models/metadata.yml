title: "Anthropic Skills: creating-financial-models — Build a Full DCF Model from One Paragraph | Ep 03"

description: |
  In this episode, we demo the creating-financial-models Anthropic Skill from Smithery.ai —
  a skill that lets Claude build complete, structured financial models from plain English
  business descriptions.

  We walk through a complete use case: starting from a single one-paragraph brief for
  "Loopline" — a fictional B2B SaaS startup — we produce a full DCF (Discounted Cash Flow)
  model including 5-year revenue projections, operating cost structure, WACC calculation with
  all assumptions documented, terminal value using two methods, and a final enterprise value
  range. Then we run a conservative scenario in under 30 seconds.

  This skill is perfect for founders prepping for fundraising, analysts building board decks,
  and finance leaders who need a rigorous first draft fast.

  TIMESTAMPS:
  0:00 — Cold Open
  0:30 — What is creating-financial-models?
  1:30 — Installation & Deep Dive
  3:30 — Live Demo: DCF Model for Loopline (SaaS startup)
  9:30 — Results & Other Use Cases
  11:00 — Wrap-Up

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/creating-financial-models
  Install: npx @smithery/cli@latest skill add anthropics/creating-financial-models
  GitHub: https://github.com/agentfactory/anthropic-skills-showcase

