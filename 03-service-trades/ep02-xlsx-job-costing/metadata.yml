title: "Anthropic Skills: xlsx — Know If April Was Actually a Good Month | Series C Ep 02"

description: |
  In this episode, we demo the xlsx Anthropic Skill from Smithery.ai.
  The skill turns any structured list — job notes, expense logs, project data — into
  a formatted Excel workbook with calculated columns, conditional formatting, and charts.

  We walk through a complete use case: a landscaping contractor's April job notes
  (15 jobs, typed on a phone between sites) become a 3-sheet Excel workbook with
  weekly revenue tracking, profit margins, and an outstanding balance tracker with aging.

  TIMESTAMPS:
  0:00 — Cold Open: finished April job tracker in Excel
  0:30 — Intro: the real cost of not tracking job costs
  1:30 — Install + Skill Deep Dive (tables, formulas, conditional formatting)
  3:30 — Live Demo: April job notes → 3-sheet Excel workbook
  9:30 — Results: parts tracker, crew time sheet, annual P&L
  11:00 — Wrap-Up + install command

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/xlsx
  Install: npx @smithery/cli@latest skill add anthropics/xlsx
  GitHub: https://github.com/agentfactory/anthropic-skills-showcase

