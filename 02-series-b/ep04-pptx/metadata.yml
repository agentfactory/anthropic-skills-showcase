title: "Anthropic Skills: pptx — Case Study to Sales Presentation | Ep B04"

description: |
  In this episode, we demo the pptx Anthropic Skill from Smithery.ai to turn a customer case study (plain text) into a polished 8-slide sales presentation — complete with a metrics bar chart, testimonial quote slide, before/after comparison, and pricing/ROI slide. Then we generate a dark theme version in one more prompt.

  This is the workflow account executives and customer success managers deal with constantly: a case study exists somewhere as a document, but a prospect needs it in slides before a meeting. The skill builds a fully editable .pptx from a 400-word text file, with chart objects, proper slide layouts, and theme switching on demand.

  TIMESTAMPS:
  0:00 — Cold Open
  0:30 — What is anthropics/pptx?
  1:30 — Installation & Skill Deep Dive
  3:30 — Live Demo: Case Study to Sales Deck
  9:30 — Results & Variations
  11:00 — Wrap-Up & What's Next

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/pptx
  Install: npx @smithery/cli@latest skill add anthropics/pptx
  GitHub: https://github.com/agentfactory/anthropic-skills-showcase

  SERIES B — Documents & Files:
  B01: docx — Professional document creation
  B02: xlsx — Spreadsheet generation and analysis
  B03: pdf — Client onboarding package assembly
  B04: pptx — Case study to sales presentation (this episode)

