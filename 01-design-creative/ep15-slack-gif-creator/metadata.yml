title: "Make Custom Slack GIFs with AI — Series A Finale (Ep 15)"

description: |
  Build 3 custom animated GIFs for your Slack workspace using the slack-gif-creator skill — no Photoshop, no After Effects, no designer needed. One install command, plain English descriptions, Slack-ready output. This is Episode 15 and the Series A finale of the Anthropic Skills Showcase.

  In this episode:
  - Deploy Party: confetti explosion with "SHIPPED" text reveal
  - PR Review: side-eye blinking animation with amber tones
  - Meeting Alert: pulsing calendar icon with spinning clock hands

  All 3 GIFs are 128×128px, looping, and under 2MB — Slack spec compliant.

  ──────────────────────────────────
  TIMESTAMPS
  ──────────────────────────────────
  0:00 — Cold open: all 3 GIFs live in Slack
  0:30 — What slack-gif-creator does and who it's for
  1:30 — Install command + SKILL.md walkthrough
  3:30 — Live demo starts: building all 3 GIFs
  4:15 — GIF 1: Deploy Party (confetti + "SHIPPED")
  5:30 — GIF 2: PR Review (side-eye blinking)
  6:20 — Refinement: extending the side-eye hold
  7:10 — GIF 3: Meeting Alert (pulsing calendar)
  8:00 — File size check — all pass Slack's 2MB limit
  8:30 — Uploading to Slack custom emoji
  9:00 — First use in a real Slack channel
  9:30 — Results + 3 more use cases
  11:00 — Series A wrap-up + Series B teaser
  11:30 — CTA: subscribe + skill link + GitHub

