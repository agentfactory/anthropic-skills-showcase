title: "Anthropic Skills: algorithmic-art — Generative Art in the Browser From a Creative Brief | Ep 14"

description: |
  In this episode, we demo the algorithmic-art Anthropic Skill from Smithery.ai —
  the skill that turns a plain-English creative brief into live, animated, self-contained
  generative art running directly in the browser.

  We generate three complete pieces from a single brief: a Perlin noise flow field in muted
  earth tones, a recursive fractal tree that reseeds on click, and a particle system that
  scatters from your mouse and drifts back with spring physics. Every output is a single
  HTML file — zero dependencies, zero build steps, opens in any browser.

  TIMESTAMPS:
  0:00 — Cold Open
  0:30 — What is algorithmic-art?
  1:30 — Installation & Deep Dive
  3:30 — Live Demo: Three generative art pieces from one brief
  9:30 — Results & Other Use Cases
  11:00 — Wrap-Up

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/algorithmic-art
  Install: npx @smithery/cli@latest skill add anthropics/algorithmic-art
  GitHub (this series): https://github.com/agentfactory/anthropic-skills-showcase
  Episode 14 folder: https://github.com/agentfactory/anthropic-skills-showcase/tree/main/01-series-a/ep14-algorithmic-art

