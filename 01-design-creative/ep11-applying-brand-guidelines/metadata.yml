title: "Apply Brand Guidelines to Any Copy — In One Prompt (Anthropic Skill #11)"

description: |
  Three writers. Three completely different tones. One brand voice guide — and one Claude skill that brings them all into alignment in a single pass.

  In this episode we install the applying-brand-guidelines skill from Smithery and use it to rewrite a too-formal blog intro, a hype-y social post, and a generic product headline — all at once — so they all sound like the same brand.

  The skill checks tone, vocabulary rules, punctuation conventions, and personality pillars. It returns the rewritten copy AND change annotations explaining every edit — so it teaches writers as it fixes their work.

  Install command:
  npx @smithery/cli@latest skill add anthropics/applying-brand-guidelines

  Skill page: https://smithery.ai/skills/anthropics/applying-brand-guidelines
  GitHub (demo files): https://github.com/agentfactory/anthropic-skills-showcase

  ──────────────────────────────────
  TIMESTAMPS
  ──────────────────────────────────
  0:00 — Cold Open: three inconsistent pieces, one skill
  0:30 — What is applying-brand-guidelines?
  1:30 — Install + SKILL.md walkthrough
  3:30 — Live Demo starts: the Verdant brand guide
  4:30 — Building the prompt
  5:30 — Watching the rewrite happen
  7:00 — Reading the change annotations
  8:00 — Iteration: tightening the social post
  9:00 — Final polished output
  9:30 — Results + 3 other use cases
  11:00 — Wrap-up + install link + next episode

  ──────────────────────────────────
  WHAT YOU'LL LEARN
  ──────────────────────────────────
  • How applying-brand-guidelines works under the hood
  • The exact prompt structure that triggers the skill
  • How to read and use the change annotations for team training
  • 3 other use cases: contractor onboarding, localisation review, email subject line filtering

  ──────────────────────────────────
  SERIES A — DESIGN & CREATIVE
  ──────────────────────────────────
  This is Episode 11 of the Anthropic Skills Showcase. Every week we take one skill from the Anthropic directory on Smithery and show you exactly what it does — install, demo, real output.

  Subscribe so you don't miss Episode 12: brand-voice — where we build a complete brand voice document from scratch using only example copy samples.

