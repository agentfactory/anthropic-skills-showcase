title: "Anthropic Skills: canvas-design — Design a Print-Ready Conference Poster in Claude | Ep 08"

description: |
  In this episode, we demo the canvas-design Anthropic Skill from Smithery.ai —
  the skill that teaches Claude to generate fully-rendered, visually designed
  HTML/CSS artifacts that actually look great.

  We create a museum-quality 18x24 inch conference poster for "Signal 2025 —
  The Future of AI Infrastructure": bold typographic layout, keynote speaker
  lineup, venue and date details — output as a self-contained HTML/CSS file
  ready to send to any print shop. Then we iterate to a second brutalist design
  direction in under two minutes, with no design tool touched.

  TIMESTAMPS:
  0:00 — Cold Open
  0:30 — What is canvas-design?
  1:30 — Installation & Skill Deep Dive
  3:30 — Live Demo: Signal 2025 Conference Poster
  9:30 — Results & Other Use Cases
  11:00 — Wrap-Up

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/canvas-design
  Install: npx @smithery/cli@latest skill add anthropics/canvas-design
  GitHub (this series): https://github.com/agentfactory/anthropic-skills-showcase
  Episode 08 folder: https://github.com/agentfactory/anthropic-skills-showcase/tree/main/01-series-a/ep08-canvas-design

