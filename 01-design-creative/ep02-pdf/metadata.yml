title: "Anthropic Skills: pdf — Merge, Watermark & Extract Tables in Minutes | Ep 02"

description: |
  In this episode, we demo the pdf Anthropic Skill from Smithery.ai —
  the universal document skill that handles merging, watermarking, and
  table extraction without any additional software or licenses.

  We take 5 quarterly PDF reports from a mock SaaS company, merge them
  into one structured master document, stamp every page with a CONFIDENTIAL
  watermark, and extract all 23 tables as clean, sourced markdown — in under
  6 minutes.

  TIMESTAMPS:
  0:00 — Cold Open
  0:30 — What is the pdf skill?
  1:30 — Installation & Deep Dive
  3:30 — Live Demo: Merge, Watermark & Extract
  9:30 — Results & Other Use Cases
  11:00 — Wrap-Up

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/pdf
  Install: npx @smithery/cli@latest skill add anthropics/pdf
  GitHub (this series): https://github.com/agentfactory/anthropic-skills-showcase
  Episode 02 folder: https://github.com/agentfactory/anthropic-skills-showcase/tree/main/01-series-a/ep02-pdf

