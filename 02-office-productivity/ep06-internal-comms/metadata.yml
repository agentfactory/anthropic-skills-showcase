title: "Anthropic Skills: internal-comms — One Update, Three Audiences | Ep B06"

description: |
  In this episode, we demo the internal-comms Anthropic Skill from Smithery.ai.

  Denis starts with a single product update brief — 8 bullet points about a pricing change
  and feature launch at a fictional company. One prompt later, the internal-comms skill
  produces THREE distinct communications:

  1. A 400-word all-hands memo for leadership (strategic framing, business impact)
  2. A 180-word Slack announcement for engineering (technical, direct, action-oriented)
  3. A 400-word email for customer-facing teams (empathetic, focused on customer experience)

  Same facts. Completely different tone. That's the aha moment.

  We then show the tone contrast side by side — the same fact expressed three ways for three
  audiences — and do a quick iteration to add an operational detail to the Slack post.

  This is the last episode of Series B (Documents & Files). Series C (Data & Analytics)
  starts with the data-visualization skill — coming next.

