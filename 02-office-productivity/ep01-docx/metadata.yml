title: "Anthropic Skills: docx — From Markdown Mess to Polished Word Report | Ep B01"
description: |
  In this episode, we demo the docx Anthropic Skill from Smithery.ai.
  It turns raw Markdown content into a professional Word document — with heading styles,
  an auto-generated table of contents, formatted tables, executive summary call-outs,
  and a footer — in a single prompt.

  We walk through: converting a project kickoff brief from a plain Markdown dump into
  a client-ready .docx report with full document structure, a styled deliverables table,
  and branded heading colors added in a follow-up iteration.

  TIMESTAMPS:
  0:00 — Cold Open
  0:30 — What is docx?
  1:30 — Installation & Deep Dive
  3:30 — Live Demo: Project Kickoff Brief
  9:30 — Results & Other Use Cases
  11:00 — Wrap-Up

  LINKS:
  Skill: https://smithery.ai/skills/anthropics/docx
  Install: npx @smithery/cli@latest skill add anthropics/docx
  GitHub: https://github.com/agentfactory/anthropic-skills-showcase

